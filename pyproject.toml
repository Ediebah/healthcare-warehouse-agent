# Tooling config only (not a build target) — ruff (lint/format) + pytest.
[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = [".venv", "warehouse", "synthea", "data"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
# keep the valuable checks (F = pyflakes bugs, I = import order); drop style-only noise we hit
# intentionally: E402 (imports after a lazy/secrets setup), E501 (long regexes/prompts), E701.
ignore = ["E402", "E501", "E701", "E702"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["."]

# Coverage gate for the agent package (CI runs `pytest --cov=agent`). Set below the current level
# (~64%) so it catches regressions with headroom — a 14-point-loose gate lets a whole test file
# vanish silently; ratchet up as the LLM-path tests grow. app.py is covered by an AppTest smoke
# test rather than this gate.
[tool.coverage.run]
source = ["agent"]

[tool.coverage.report]
fail_under = 60
show_missing = true
exclude_lines = ["pragma: no cover", "if __name__ == .__main__.:", "raise NotImplementedError"]
