name: ci

on:
  push:
    branches: [main]
  pull_request:

# A superseded push's run is wasted compute — cancel it when a newer commit arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  warehouse-and-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # a hung download/build must not burn the 6h default
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"        # Synthea's build target

      - name: Install dependencies
        run: pip install -r requirements-dev.txt   # app runtime + dbt

      - name: Lint (ruff) + unit tests (pytest) with coverage gate — fast, no API key
        run: |
          ruff check .
          pytest --cov=agent --cov-report=term-missing

      - name: Generate a small, reproducible Synthea dataset
        # Pinned release (NOT master-branch-latest, a moving target that can break CI with no code
        # change and silently varies the generated data over time). Bump deliberately.
        run: |
          mkdir -p synthea data          # these dirs are git-ignored (empty) → recreate on checkout
          curl -L --fail -o synthea/synthea-with-dependencies.jar \
            https://github.com/synthetichealth/synthea/releases/download/v4.0.0/synthea-with-dependencies.jar
          cd synthea
          java -jar synthea-with-dependencies.jar \
            --exporter.csv.export true --exporter.fhir.export false \
            -p 60 -s 12345 -cs 12345 Massachusetts

      - name: Load raw CSVs into DuckDB
        run: python scripts/load_raw.py

      - name: dbt build (models + data tests)
        working-directory: warehouse
        run: |
          dbt deps
          dbt build --profiles-dir .

      - name: Regenerate semantic catalog from dbt artifacts
        run: |
          cd warehouse && dbt docs generate --profiles-dir . && cd ..
          python agent/build_catalog.py

      - name: Guardrail precision / recall (deterministic, no API key)
        run: python -m agent.guardrail_eval

      - name: Agent modules import cleanly
        run: python -c "import agent.agent, agent.retrieval, agent.warehouse, agent.guardrails"
