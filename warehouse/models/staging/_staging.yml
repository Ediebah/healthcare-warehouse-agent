version: 2

# Model-level docs + generic tests for the staging layer. A "generic test" (not_null,
# unique, relationships, accepted_values) compiles to a SELECT that returns failing rows;
# 0 rows = pass. Descriptions here flow into `dbt docs` and the Weekend-2 semantic catalog.
#
# dbt 1.11 syntax note: tests that take arguments (accepted_values, relationships) nest them
# under an `arguments:` block. Argument-less tests (not_null, unique) stay in the flat list.

models:
  - name: stg_patients
    description: "One row per synthetic patient. Renamed/typed from raw.patients; adds an is_deceased flag."
    columns:
      - name: patient_id
        description: "Patient natural key (UUID). Primary key of the patient grain."
        data_tests: [not_null, unique]
      - name: birth_date
        description: "Date of birth (cast from text)."
        data_tests: [not_null]
      - name: gender
        description: "Biological sex as generated by Synthea."
        data_tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']
      - name: is_deceased
        description: "True if the patient has a death date."
        data_tests: [not_null]

  - name: stg_encounters
    description: "One row per healthcare encounter (visit). Grain: encounter_id."
    columns:
      - name: encounter_id
        description: "Encounter natural key (UUID). Primary key."
        data_tests: [not_null, unique]
      - name: patient_id
        description: "FK to the patient who had the encounter."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_patients')
                field: patient_id
      - name: payer_id
        description: "FK to the insurance payer (nullable)."
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_payers')
                field: payer_id
      - name: encounter_class
        description: "Care setting of the encounter."
        data_tests:
          - accepted_values:
              arguments:
                values: ['ambulatory', 'wellness', 'outpatient', 'urgentcare',
                         'emergency', 'inpatient', 'home', 'hospice', 'snf', 'virtual']
      - name: total_claim_cost
        description: "Total billed cost of the encounter (USD)."

  - name: stg_conditions
    description: "One row per patient-condition episode (SNOMED-CT). Onset/resolution dates; no natural PK."
    columns:
      - name: patient_id
        description: "FK to the patient."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_patients')
                field: patient_id
      - name: condition_code
        description: "SNOMED-CT code for the condition."
        data_tests: [not_null]
      - name: onset_date
        description: "Date the condition began."
        data_tests: [not_null]

  - name: stg_medications
    description: "One row per medication order (RxNorm). Start/stop, cost, dispense count; no natural PK."
    columns:
      - name: patient_id
        description: "FK to the patient."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_patients')
                field: patient_id
      - name: medication_code
        description: "RxNorm code for the medication."
        data_tests: [not_null]

  - name: stg_observations
    description: "Tall labs/vitals/survey results (LOINC). One row per measurement; VALUE split into text + numeric."
    columns:
      - name: patient_id
        description: "FK to the patient."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_patients')
                field: patient_id
      - name: value_type
        description: "Synthea's own tag for whether VALUE is numeric or text."
        data_tests:
          - accepted_values:
              arguments:
                values: ['numeric', 'text']

  - name: stg_procedures
    description: "One row per procedure performed (SNOMED-CT). No natural PK."
    columns:
      - name: patient_id
        description: "FK to the patient."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_patients')
                field: patient_id
      - name: procedure_code
        description: "SNOMED-CT code for the procedure."
        data_tests: [not_null]

  - name: stg_claims
    description: "One row per insurance claim header (thin slice of 31 raw columns)."
    columns:
      - name: claim_id
        description: "Claim natural key (UUID). Primary key."
        data_tests: [not_null, unique]
      - name: patient_id
        description: "FK to the patient."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_patients')
                field: patient_id

  - name: stg_organizations
    description: "One row per healthcare organization (hospital/clinic)."
    columns:
      - name: organization_id
        description: "Organization natural key (UUID). Primary key."
        data_tests: [not_null, unique]

  - name: stg_providers
    description: "One row per clinician, linked to an organization."
    columns:
      - name: provider_id
        description: "Provider natural key (UUID). Primary key."
        data_tests: [not_null, unique]
      - name: organization_id
        description: "FK to the provider's organization."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_organizations')
                field: organization_id
      - name: specialty
        description: "Clinical specialty (normalized from Synthea's SPECIALITY spelling)."

  - name: stg_payers
    description: "One row per insurance payer."
    columns:
      - name: payer_id
        description: "Payer natural key (UUID). Primary key."
        data_tests: [not_null, unique]
      - name: payer_name
        description: "Payer name (e.g. Medicare, Medicaid, or a private insurer)."
        data_tests: [not_null]
