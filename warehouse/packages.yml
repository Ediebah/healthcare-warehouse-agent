# Third-party dbt packages. Installed with `dbt deps` into warehouse/dbt_packages/.
# dbt_utils gives us generate_surrogate_key() (for facts with no natural PK) and
# extra generic tests. It's the de-facto standard utility package.
packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]
