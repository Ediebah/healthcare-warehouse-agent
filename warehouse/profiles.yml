# Connection config for the `healthcare` profile.
#
# Normally profiles.yml lives in ~/.dbt/ and is NOT committed (it holds warehouse
# passwords). We keep it in the repo because DuckDB is just a local file — no secrets —
# and it makes the project clone-and-run. We point dbt at it with --profiles-dir.
#
# The `path` is RELATIVE TO THE PROCESS WORKING DIRECTORY. We always run dbt from inside
# warehouse/, so ../data/healthcare.duckdb resolves to the repo's data/ folder — the same
# file scripts/load_raw.py writes to.

healthcare:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ../data/healthcare.duckdb
      schema: main          # models build here; raw source data lives in schema `raw`
      threads: 4

    # Snowflake connection SCAFFOLD — untested, and the models are currently DuckDB-dialect
    # (date_diff, unnest(generate_series(...)), hash() semantics, GREATEST null handling), so
    # `dbt build --target prod` will NOT compile as-is; a cross-dialect port is on the roadmap.
    # To use it: `pip install dbt-snowflake`, set the env vars below, load the raw CSVs into a
    # HEALTHCARE.RAW schema, and port the dialect-specific SQL. Credentials come from the
    # environment — nothing secret is committed.
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', '') }}"
      user: "{{ env_var('SNOWFLAKE_USER', '') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD', '') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'TRANSFORMER') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'HEALTHCARE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'MAIN') }}"
      threads: 4
